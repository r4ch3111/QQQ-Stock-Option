name: QQQ Options Scan

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Ticker to scan"
        required: false
        default: "QQQ"

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas numpy scipy matplotlib requests

      - name: Run scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python qqq_options_model.py --ticker ${{ github.event.inputs.ticker }} --telegram-send-chart
